name: documentation_default
version: 1.0.0
description: |
  Evidence-based documentation-generation prompt (see #244). Short, direct,
  with an explicit output contract. Replaces the 69-line variant whose 9
  numbered sections + unbound `{format}` / `{context}` placeholders reached
  the LLM as literal text. Design rationale + citations in docs/llm_evals.md.
tags:
  - documentation
  - default
template: |
  You generate developer-facing documentation. Output ONLY the documentation
  content — no preamble, no meta-commentary, no wrapping code fence.

  Write {doc_format} documentation for the {language} source below,
  in "{doc_style}" style.

  <source>
  {code}
  </source>

  Rules (all mandatory):
  - Document only symbols visible in <source>. Do not invent functions,
    classes, parameters, or exceptions.
  - For every public function / class / method: purpose in one sentence,
    parameters (name, type, meaning), return value, exceptions raised.
  - Include at least one runnable usage example per public entry point.
  - Use {doc_format} conventions. No second-format leakage.

  Output contract: emit {doc_format} content directly. Do NOT wrap the whole
  response in an outer code fence. Code examples *inside* the doc MAY use
  fences. Nothing before or after the documentation.
variables:
  - name: code
    description: Source code to document
    type: string
    required: true
  - name: language
    description: Programming language (e.g. `python`)
    type: string
    required: true
  - name: doc_format
    description: Output format (markdown | rst | html | docstring | json)
    type: string
    required: false
    default: markdown
  - name: doc_style
    description: Tone / depth (standard | detailed | minimal | api | tutorial)
    type: string
    required: false
    default: standard
optimization_hints:
  - short_direct_prompt
  - explicit_output_contract
  - api_hallucination_guard
