name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install ruff
        run: pip install "ruff>=0.15.0"

      - name: Run ruff check
        run: ruff check collegue tests

      - name: Run ruff format check
        run: ruff format --check collegue tests

  pytest:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        env:
          PYTHONPATH: .
        run: pytest tests/ --maxfail=5 --cov=collegue --cov-report=term-missing --cov-report=xml --cov-fail-under=60

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      # pip-audit --strict audite tout l'environnement, pip/setuptools compris.
      # Le pip par défaut du runner traîne des CVE déjà corrigées en amont :
      # on l'upgrade d'abord pour ne pas bloquer sur des outils de build.
      - name: Upgrade pip toolchain
        run: python -m pip install --upgrade pip setuptools

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit --strict --desc

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/collegue/Dockerfile
          push: false
          load: true
          tags: collegue:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts
        run: |
          docker run --rm -d --name collegue-smoke \
            -e LLM_API_KEY=test-key \
            -e LLM_MODEL=test-model \
            collegue:ci &
          sleep 5
          docker logs collegue-smoke || true
          docker stop collegue-smoke || true
