name: Temporary PR 585 real QA validation

on:
  push:
    branches: [validation/pr585-real-qa]

permissions:
  contents: read

jobs:
  qa-oracle:
    name: Real plan-time QA oracle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR585_HEAD_SHA: 3e3141913948b558cfdfdde7a12589fd1db0bfb3
      STATE_DATABASE_URL: sqlite:////tmp/pr585-qa-state.db
      COLLEGUE_HOME: /tmp/pr585-collegue-home
      GATE_ACCEPTANCE_TESTS: "true"
      LLM_PROVIDER: gemini
      LLM_MODEL: gemma-4-31b-it
      LLM_PROVIDER_QA: gemini
      LLM_MODEL_QA: gemma-4-26b-a4b-it
      LLM_CALL_TIMEOUT: "180"
      MAX_TOKENS_BUDGET: "32768"
      MAX_COST_USD: "0"
      REQUIRE_COST_PRICING: "false"
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify the exact PR head is the validation commit parent
        run: test "$(git rev-parse HEAD^)" = "$PR585_HEAD_SHA"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Migrate isolated SQLite state
        run: python -m alembic upgrade head

      - name: Generate and verify one real QA oracle
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.LLM_API_KEY }}
          QA_REPORT_PATH: qa-validation/pr585-oracle.md
        run: timeout 240s python scripts/validate_pr585_real_qa.py

      - name: Upload the oracle for human inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr585-real-qa-oracle
          path: qa-validation/pr585-oracle.md
          if-no-files-found: ignore
          retention-days: 1
