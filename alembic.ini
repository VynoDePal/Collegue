# Configuration Alembic pour le store d'état projet (C6).
# L'URL de connexion n'est PAS codée ici : alembic/env.py la résout depuis
# STATE_DATABASE_URL (env) ou settings.STATE_DATABASE_URL. Cible PostgreSQL.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Laissé vide volontairement : surchargé dynamiquement par env.py.
sqlalchemy.url =

[post_write_hooks]
# (optionnel) formatage des migrations générées — non activé.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
