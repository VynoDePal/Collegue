services:
  collegue-app:
    build:
      context: .
      dockerfile: docker/collegue/Dockerfile
    image: collegue-app:latest
    restart: always
    # Exposer directement le port MCP pour contourner Traefik (version incompatible)
    ports:
      - "4121:4121"
      - "4122:4122"
    environment:
      PYTHONUNBUFFERED: 1
      PORT: 4121
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    env_file:
      - .env
    # Données persistantes partagées avec le dashboard (métriques, activité, mémoire).
    # Sans ce volume commun, le dashboard lit un répertoire vide et tous ses
    # onglets restent vides en permanence.
    volumes:
      - collegue_data:/app/.collegue
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4122/_health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  collegue-dashboard:
    build:
      context: .
      dockerfile: docker/collegue/Dockerfile
    image: collegue-app:latest
    restart: always
    ports:
      - "4125:4125"
    environment:
      PYTHONUNBUFFERED: 1
    env_file:
      - .env
    # Même volume que collegue-app : le dashboard lit les stores disque
    # (monitoring/activity.jsonl, monitoring/metrics.json, memory/project_memory.json)
    # écrits par le serveur MCP, pour un affichage temps réel.
    volumes:
      - collegue_data:/app/.collegue
    command: ["streamlit", "run", "collegue/dashboard/app.py", "--server.port=4125", "--server.address=0.0.0.0", "--server.headless=true"]
    depends_on:
      collegue-app:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    env_file:
      - .env
    ports:
      - "4123:8080"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: always
    ports:
      - "8088:80"
    volumes:
      - nginx_logs:/var/log/nginx
    depends_on:
      collegue-app:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nginx_logs:
  collegue_data:
