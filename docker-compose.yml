services:
  collegue-app:
    build:
      context: .
      dockerfile: docker/collegue/Dockerfile
    image: collegue-app:latest
    restart: always
    # Exposer directement le port MCP pour contourner Traefik (version incompatible)
    ports:
      - "4121:4121"
      - "4122:4122"
    environment:
      PYTHONUNBUFFERED: 1
      PORT: 4121
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    env_file:
      - .env
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4122/_health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    env_file:
      - .env
    ports:
      - "4123:8080"

  # kc-provisioner: TEMPORAIREMENT DÉSACTIVÉ - bloquait le démarrage (client windsurf non trouvé)
  # TODO: Réactiver après création du client OAuth dans Keycloak ou suppression si non nécessaire
  # kc-provisioner:
  #   build:
  #     context: .
  #     dockerfile: docker/kc-provisioner/Dockerfile
  #   depends_on:
  #     keycloak:
  #       condition: service_started
  #   environment:
  #     KC_URL: http://keycloak:8080
  #     KC_REALM: ${KC_REALM:-master}
  #     KC_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
  #     KC_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
  #     PROVISION_CLIENT_ID: ${PROVISION_CLIENT_ID:-windsurf-client}
  #     REQUIRED_SCOPE: ${OAUTH_REQUIRED_SCOPES:-mcp.read}
  #     WAIT_FOR_CLIENT_SECONDS: ${WAIT_FOR_CLIENT_SECONDS:-600}
  #   restart: "no"

  # Caddy gère HTTPS automatiquement (remplace nginx et contourne Traefik cassé)
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      collegue-app:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
